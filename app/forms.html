<!DOCTYPE html>
<html lang="es-CO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elián Mendoza | Formularios</title>
    <link rel="shortcut icon" href="../assets/img/oceano.gif" type="image/x-icon" />
    <meta name="author" content="Elián Mendoza">
    <meta name="description" content="Formularios de Registro e Inicio de Sesión - Taller 3">
    <meta name="keywords" content="Elián Mendoza, Portafolio, Formularios">

    <meta name="theme-color" content="#006994" />
    <meta name="MobileOptimized" content="width" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      body {
        background: linear-gradient(135deg, #001f3f 0%, #006994 100%);
        color: #e0f7fa;
      }
      .navbar,
      .footer-dark {
        background: linear-gradient(90deg, #003366 0%, #004a7c 100%) !important;
      }
      .btn-primary,
      .bg-primary {
        background-color: #00bcd4 !important;
        border-color: #00bcd4 !important;
      }
      .btn-outline-primary {
        color: #80deea;
        border-color: #80deea;
      }
      .btn-outline-primary:hover {
        background-color: #00bcd4;
        border-color: #00bcd4;
        color: white;
      }
      .text-primary {
        color: #80deea !important;
      }
      .bg-light,
      .card {
        background-color: #ffffff !important;
        color: #111827 !important;
      }
      .border-primary {
        border-color: #00bcd4 !important;
      }
      .navbar-dark .navbar-nav .nav-link,
      .navbar-dark .navbar-brand,
      .navbar-dark .navbar-toggler {
        color: #ffffff !important;
      }
      .navbar-dark .navbar-nav .nav-link:hover {
        color: #b8adff !important;
      }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-expand-sm navbar-dark fixed-top shadow">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="../index.html">
            <i class="bi bi-water me-2 text-primary"></i><span class="text-white">Elián Mendoza</span>
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-sm-0">
              <li class="nav-item"><a class="nav-link" href="../app/index.html"><i class="bi bi-house-door me-1"></i>Inicio</a></li>
            </ul>
            <div class="d-flex">
              <a href="forms.html" class="btn btn-outline-primary btn-sm px-3 fw-semibold active text-white"><i class="bi bi-box-arrow-in-right me-1"></i>Acceder</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center" style="margin-top: 100px; margin-bottom: 50px;">
        <div class="container">
            <div class="row g-4 justify-content-center">

                <!-- Registro -->
                <div class="col-12 col-md-6 col-lg-5">
                    <div class="card h-100 border-0 shadow p-4 bg-white rounded-4">
                        <form>
                            <div class="d-flex align-items-center mb-4">
                                <div class="p-2 rounded-3 me-3 text-primary" style="background-color: rgba(0, 188, 212, 0.15);">
                                    <i class="bi bi-person-plus-fill fs-3"></i>
                                </div>
                                <h2 class="h3 mb-0 fw-bold" style="color: #111827;">Registro</h2>
                            </div>
                            <div class="mb-3"><label class="form-label fw-semibold text-muted">Nombre</label><input type="text" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <div class="mb-3"><label class="form-label fw-semibold text-muted">Apellido</label><input type="text" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <div class="mb-3"><label class="form-label fw-semibold text-muted">Correo</label><input type="email" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <div class="mb-4"><label class="form-label fw-semibold text-muted">Contraseña</label><input type="password" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <button type="button" class="btn btn-primary btn-lg w-100 shadow-sm fw-bold">Registrarse</button>
                        </form>
                    </div>
                </div>

                <!-- Inicio Sesión -->
                <div class="col-12 col-md-6 col-lg-5">
                    <div class="card h-100 border-0 shadow p-4 bg-white rounded-4">
                        <form>
                            <div class="d-flex align-items-center mb-4">
                                <div class="p-2 rounded-3 me-3 text-primary" style="background-color: rgba(0, 188, 212, 0.15);">
                                    <i class="bi bi-shield-lock-fill fs-3"></i>
                                </div>
                                <h2 class="h3 mb-0 fw-bold" style="color: #111827;">Inicio Sesión</h2>
                            </div>
                            <div class="mb-3"><label class="form-label fw-semibold text-muted">Email</label><input type="email" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <div class="mb-3"><label class="form-label fw-semibold text-muted">Contraseña</label><input type="password" class="form-control form-control-lg border" style="background-color: #f0faff;"></div>
                            <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label text-muted" for="rememberMe">Recordarme en este dispositivo</label></div>
                            <button type="button" class="btn btn-primary btn-lg w-100 shadow-sm fw-bold">Iniciar sesión</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer-dark text-white px-4 py-5 text-center border-top border-secondary border-opacity-25">
      <div class="py-4">
        <p class="fs-3 fw-bold mb-3 text-white">Elián Mendoza</p>
        <p class="fs-6 mb-4 text-white opacity-75">Estudiante de Análisis y Desarrollo de Software.</p>
        <p class="mb-0 small text-uppercase tracking-wider text-white opacity-50">&copy; 2026 Océano Digital. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
